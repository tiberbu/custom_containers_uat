name: Build Frappe Image

on:
  workflow_dispatch:
    inputs:
      image:
        description: Image name
        required: true
        type: string
      version:
        description: Image version tag
        required: true
        type: string
      frappe-repo:
        description: Frappe repo URL
        required: false
        type: string
      frappe-version:
        description: Frappe branch/tag
        required: false
        type: string
      py-version:
        description: Python version
        required: false
        type: string
      nodejs-version:
        description: NodeJS version
        required: false
        type: string
      apps-json-base64:
        description: Base64 encoded apps.json
        required: false
        type: string
      dockerfile:
        description: Dockerfile path relative to repo root
        required: false
        type: string

env:
  AWS_REGION: eu-west-2
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-west-2.amazonaws.com

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set dynamic environment variables
        run: |
          echo "IMAGE_NAME=${{ inputs.image }}" >> $GITHUB_ENV
          echo "IMAGE_VERSION=${{ inputs.version }}" >> $GITHUB_ENV
          echo "FRAPPE_PATH=${{ inputs.frappe-repo || 'https://github.com/frappe/frappe' }}" >> $GITHUB_ENV
          echo "FRAPPE_BRANCH=${{ inputs.frappe-version || 'version-15' }}" >> $GITHUB_ENV
          echo "PYTHON_VERSION=${{ inputs.py-version || '3.12' }}" >> $GITHUB_ENV
          echo "NODE_VERSION=${{ inputs.nodejs-version || '20' }}" >> $GITHUB_ENV
          echo "APPS_JSON_BASE64=${{ inputs.apps-json-base64 || '' }}" >> $GITHUB_ENV
          echo "DOCKERFILE_PATH=${{ inputs.dockerfile || 'Dockerfile' }}" >> $GITHUB_ENV

      - name: Clean git cache
        run: git clean -ffdx && git reset --hard

      - name: Prepare build context
        run: |
          mkdir -p /tmp/build-context
          cp -r "$DOCKERFILE_PATH" /tmp/build-context/Dockerfile
          cp -r ci /tmp/build-context/ || echo "No ci folder, skipping"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure ECR repository exists
        run: |
          if ! aws ecr describe-repositories --repository-names "$IMAGE_NAME" >/dev/null 2>&1; then
            aws ecr create-repository \
              --repository-name "$IMAGE_NAME" \
              --region "$AWS_REGION" \
              --image-scanning-configuration scanOnPush=true \
              --encryption-configuration encryptionType=AES256
          fi

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin "$ECR_REGISTRY"

      - name: Build and push Docker image
        uses: int128/kaniko-action@v1
        with:
          push: true
          cache: false
          kaniko-args: |
            --context=/tmp/build-context
            --dockerfile=/tmp/build-context/Dockerfile
            --destination=${ECR_REGISTRY}/${IMAGE_NAME}:${IMAGE_VERSION}
            --build-arg=FRAPPE_PATH=${FRAPPE_PATH}
            --build-arg=FRAPPE_BRANCH=${FRAPPE_BRANCH}
            --build-arg=PYTHON_VERSION=${PYTHON_VERSION}
            --build-arg=NODE_VERSION=${NODE_VERSION}
            --build-arg=APPS_JSON_BASE64=${APPS_JSON_BASE64}
